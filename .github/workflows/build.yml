name: Build
on: [push, pull_request]
jobs:
  windows-build:
    name: Windows build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache
        uses: actions/cache@v4
        with:
          key: x86_64-pc-windows-gnu-${{ hashFiles('Cargo.lock') }}
          path: |
            ~/.cargo
            target
      - name: Install MinGW
        run: sudo apt update && sudo apt install gcc-mingw-w64 g++-mingw-w64
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-pc-windows-gnu
      - name: Build
        run: cargo build --release --locked --features sdl3-static --target x86_64-pc-windows-gnu
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: x86_64-pc-windows-gnu
          path: |
            target/x86_64-pc-windows-gnu/release/ggoled.exe
            target/x86_64-pc-windows-gnu/release/ggoled_app.exe
