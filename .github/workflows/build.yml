name: Build
on: [push, pull_request]
jobs:
  windows-build:
    name: Windows build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Cache
        uses: actions/cache@v5
        with:
          key: x86_64-pc-windows-gnu-${{ hashFiles('Cargo.lock') }}
          path: |
            ~/.cargo
            target
      - name: Install MinGW
        run: sudo apt update && sudo apt install gcc-mingw-w64 g++-mingw-w64
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-pc-windows-gnu
      - name: Build
        run: cargo build --release --locked --features sdl3-static --target x86_64-pc-windows-gnu
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: x86_64-pc-windows-gnu
          path: |
            target/x86_64-pc-windows-gnu/release/ggoled.exe
            target/x86_64-pc-windows-gnu/release/ggoled_app.exe
  flatpak-build:
    name: Flatpak build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Cache
        uses: actions/cache@v5
        with:
          key: flatpak-${{ hashFiles('Cargo.lock', 'flatpak/se.ramse.ggoled.yml') }}
          path: |
            ~/.cargo
            ~/.local/share/flatpak
            flatpak/.flatpak-builder
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install flatpak
        run: sudo apt update && sudo apt install flatpak dbus-x11
      - name: Build
        run: dbus-run-session bash flatpak/build.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ggoled-x86_64.flatpak
          path: flatpak/ggoled-x86_64.flatpak
  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows-build, flatpak-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts (windows-build)
        uses: actions/download-artifact@v8
        with:
          name: x86_64-pc-windows-gnu
          path: binaries
      - name: Download artifacts (flatpak-build)
        uses: actions/download-artifact@v8
        with:
          name: ggoled-x86_64.flatpak
          path: binaries
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            binaries/**/*.exe
            binaries/**/*.flatpak
